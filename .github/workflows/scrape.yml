name: Scrape Rightmove

on:
  schedule:
    - cron: '*/15 7-18 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-scrape]

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'

      - run: uv sync

      - name: Run tracker
        if: ${{ github.event.schedule != '0 19 * * *' || github.event_name != 'schedule' }}
        run: uv run python rightmove_tracker.py
        env:
          SEARCH_URL: ${{ secrets.SEARCH_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run digest
        if: ${{ github.event.schedule == '0 19 * * *' }}
        run: uv run python rightmove_tracker.py --digest
        env:
          SEARCH_URL: ${{ secrets.SEARCH_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
